<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axe 1 - Generative Art</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="page">
    <header class="topbar">
        <a class="brand" href="{{ url_for('home') }}">Interactive Generative Studio</a>
        <nav>
            <a href="{{ url_for('generative') }}">Axe 1</a>
        </nav>
    </header>

    <main class="generator-layout">
        <section class="panel">
            <p class="eyebrow">Axe 1</p>
            <h1>Generative Art</h1>
            <p class="muted">Generate layered geometric art with random rules and OOP shape classes.</p>

            <form action="{{ url_for('generate') }}" method="POST" class="controls">
                <label>
                    <span>Number of shapes <strong id="shapeCountValue">{{ shape_count }}</strong></span>
                    <input type="range" id="shapeCount" name="shape_count" min="10" max="180" value="{{ shape_count }}" step="5">
                </label>

                <label>
                    <span>Maximum size <strong id="sizeValue">{{ max_size }}</strong></span>
                    <input type="range" id="maxSize" name="max_size" min="12" max="110" value="{{ max_size }}" step="2">
                </label>

                <label>
                    <span>Palette</span>
                    <select name="palette">
                        {% for palette in palettes %}
                            <option value="{{ palette }}" {% if palette == selected_palette %}selected{% endif %}>
                                {{ palette|capitalize }}
                            </option>
                        {% endfor %}
                    </select>
                </label>

                <button type="submit">Generate artwork</button>
            </form>
        </section>

        <section class="art-stage">
            {% if artwork %}
                <img src="data:image/png;base64,{{ artwork }}" alt="Generated geometric artwork">
                <a class="download-link" href="data:image/png;base64,{{ artwork }}" download="axe1-generative-art.png">
                    Download PNG
                </a>
            {% else %}
                <div class="empty-art">
                    <p>Choose parameters and generate your first artwork.</p>
                </div>
            {% endif %}
        </section>
    </main>

    <script>
        const shapeCount = document.getElementById("shapeCount");
        const maxSize = document.getElementById("maxSize");
        const shapeCountValue = document.getElementById("shapeCountValue");
        const sizeValue = document.getElementById("sizeValue");

        shapeCount.addEventListener("input", () => {
            shapeCountValue.textContent = shapeCount.value;
        });

        maxSize.addEventListener("input", () => {
            sizeValue.textContent = maxSize.value;
        });
    </script>
</body>
</html>
