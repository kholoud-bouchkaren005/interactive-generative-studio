<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axe 4 - Interactive Canvas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="studio-page">
    <header class="topbar">
        <a class="brand" href="{{ url_for('home') }}">Interactive Generative Studio</a>
        <nav class="nav-links">
            <a href="{{ url_for('generative') }}">Axe 1</a>
            <a href="{{ url_for('data_art') }}">Axe 2</a>
            <a href="{{ url_for('image_audio_tools') }}">Axe 3</a>
            <a href="{{ url_for('canvas') }}">Axe 4</a>
            <a href="{{ url_for('ml_palette') }}">Axe 6</a>
        </nav>
    </header>

    <main class="workspace">
        <section class="tool-panel">
            <div class="panel-heading">
                <p class="eyebrow">Axe 4</p>
                <h1>Interactivity Module</h1>
            </div>

            <label class="control-row" for="shapeType">
                <span>Shape</span>
                <select id="shapeType">
                    <option value="circle">Circle</option>
                    <option value="square">Square</option>
                    <option value="triangle">Triangle</option>
                    <option value="line">Line</option>
                </select>
            </label>

            <label class="control-row" for="palette">
                <span>Palette</span>
                <select id="palette">
                    <option value="aurora">Aurora</option>
                    <option value="citrus">Citrus</option>
                    <option value="mono">Ink</option>
                    <option value="neon">Neon</option>
                </select>
            </label>

            <label class="control-row" for="shapeSize">
                <span>Size <strong id="sizeValue">34</strong></span>
                <input type="range" id="shapeSize" min="10" max="90" value="34">
            </label>

            <label class="control-row" for="shapeCount">
                <span>Burst <strong id="countValue">5</strong></span>
                <input type="range" id="shapeCount" min="1" max="18" value="5">
            </label>

            <label class="toggle-row" for="animateToggle">
                <span>Animation</span>
                <input type="checkbox" id="animateToggle" checked>
            </label>

            <div class="button-grid">
                <button type="button" id="randomBtn">Random</button>
                <button type="button" id="clearBtn">Clear</button>
                <button type="button" id="downloadBtn">Download PNG</button>
            </div>
        </section>

        <section class="canvas-stage">
            <canvas id="artCanvas" width="960" height="620"></canvas>
            <p class="canvas-hint">Click or drag on the canvas to add shapes.</p>
        </section>
    </main>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
