{% extends "base.html" %}

{% block title %}Chroma - Studio{% endblock %}

{% block content %}
<main class="module-page">
    <section class="module-header shell">
        <p class="breadcrumb">Studio / Chroma</p>
        <h1>Chroma</h1>
        <p>Extract dominant colors with machine learning.</p>
    </section>

    <section class="workspace-grid shell">
        <aside class="control-panel">
            <form id="paletteForm" class="controls">
                <label class="drop-zone" for="imageInput">
                    <input type="file" id="imageInput" name="image" accept="image/*" required>
                    <span>Drop image here or browse</span>
                    <small>K-means will find the dominant colors</small>
                </label>

                <label class="control-row" for="colorCount">
                    <span>Colors <strong id="colorCountValue">5</strong></span>
                    <input type="range" id="colorCount" name="colors" min="2" max="8" value="5">
                </label>

                <button type="submit" class="submit-btn" data-loading-text="Extracting">Extract Palette</button>
            </form>

            <p id="paletteMessage" class="status-message"></p>
        </aside>

        <section class="output-panel chroma-output">
            <div id="imagePreview" class="image-preview empty-preview"></div>
            <div id="paletteResult" class="palette-result"></div>
            <div id="paletteBar" class="palette-bar"></div>
        </section>
    </section>
</main>
{% endblock %}
