{% extends "base.html" %}

{% block title %}Gallery - Studio{% endblock %}

{% block content %}
<main class="gallery-page">
    <section class="gallery-hero shell">
        <p class="breadcrumb">Studio / Gallery</p>
        <h1>Gallery</h1>
        <p>Explore what the studio can create.</p>
    </section>

    <section class="gallery-grid shell" aria-label="Studio gallery">
        {% for module in modules %}
            <a class="gallery-card gallery-card-{{ module.key }}" href="{{ url_for(module.route) }}">
                <div class="gallery-thumb">
                    <span>{{ module.icon }}</span>
                </div>
                <div class="gallery-card-body">
                    <h2>{{ module.title }}</h2>
                    <p>{{ module.description }}</p>
                    <strong>Open module &rarr;</strong>
                </div>
            </a>
        {% endfor %}
    </section>
</main>
{% endblock %}
